    <body>
        <div class="card" style="width: 100%">
            
            
            <div id="mynetwork" class="card-body"></div>
        </div>

        
        

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#4da6ff", "font": {"color": "#112D4E"}, "id": "COMP_AA", "label": "AA", "shape": "dot", "size": 60, "title": "AA (Company)"}, {"color": "#ff9900", "font": {"color": "#112D4E"}, "id": "PUB_AARP", "label": "AARP", "shape": "dot", "size": 60, "title": "AARP (Publisher)"}, {"color": "#ff9900", "font": {"color": "#112D4E"}, "id": "PUB_Abe_Raymond", "label": "Abe Raymond", "shape": "dot", "size": 60, "title": "Abe Raymond (Publisher)"}, {"color": "#ff5252", "font": {"color": "#112D4E"}, "id": "EVENT_Credit_Rating", "label": "Credit Rating", "shape": "dot", "size": 60, "title": "Credit Rating (Event)"}]);
                  edges = new vis.DataSet([{"color": "rgba(17, 45, 78, 0.15)", "from": "COMP_AA", "title": "PUBLISHED_BY", "to": "PUB_Abe_Raymond", "value": 4.0}, {"color": "rgba(17, 45, 78, 0.15)", "from": "COMP_AA", "title": "HAS_EVENT", "to": "EVENT_Credit_Rating", "value": 23.0}, {"color": "rgba(17, 45, 78, 0.15)", "from": "PUB_Abe_Raymond", "title": "REPORTS", "to": "EVENT_Credit_Rating", "value": 2.0}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": false
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "barnesHut": {
            "avoidOverlap": 0,
            "centralGravity": 0.3,
            "damping": 0.09,
            "gravitationalConstant": -8000,
            "springConstant": 0.001,
            "springLength": 150
        },
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
