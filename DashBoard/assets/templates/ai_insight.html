<div style="
    background: linear-gradient(145deg, var(--card-bg) 0%, rgba(0,0,0,0) 100%);
    border: 1px solid var(--border-color);
    border-left: 4px solid var(--accent);
    border-radius: 8px;
    padding: 20px 25px;
    margin: 20px 0;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    position: relative;
    overflow: hidden;
">
    <div style="
        position: absolute; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        background: radial-gradient(circle at top left, var(--accent) 0%, transparent 40%); 
        opacity: 0.1; 
        pointer-events: none;
    "></div>
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
            <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
        <span style="font-weight: 700; font-size: 1.05rem; color: var(--text-bright); letter-spacing: 0.5px; text-transform: uppercase;">System AI Insight</span>
    </div>
    <div style="font-size: 1.0rem; color: var(--text-primary); line-height: 1.6; font-weight: 400;">
        {insight_text}
    </div>
</div>
