<div style="display: flex; gap: 20px; margin-top: 15px; margin-bottom: 30px;">
    <style>
        .pulse-card {{
            flex: 1; min-width: 200px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px; padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative; overflow: hidden;
        }}
        .pulse-title {{ font-size: 0.9rem; color: var(--text-primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; opacity: 0.8; }}
        .pulse-value {{ font-size: 2.2rem; font-weight: 800; color: var(--text-bright); margin-bottom: 5px; }}
        .pulse-delta {{ font-size: 0.95rem; font-weight: 600; padding: 4px 8px; border-radius: 4px; display: inline-block; }}
        .delta-bull {{ background: var(--bg-bull); color: var(--color-bull); }}
        .delta-bear {{ background: var(--bg-bear); color: var(--color-bear); }}
        .delta-neutral {{ background: var(--bg-neutral); color: var(--color-neutral); }}
    </style>

    <div class="pulse-card">
        <div class="pulse-title">Market Sentiment</div>
        <div class="pulse-value">{sentiment}</div>
        <div><span class="pulse-delta delta-bull">▲ Strong Momentum</span></div>
    </div>
    
    <div class="pulse-card">
        <div class="pulse-title">System Activity</div>
        <div class="pulse-value">{activity}</div>
        <div><span class="pulse-delta delta-bull">⚡ High Volume</span></div>
    </div>

    <div class="pulse-card">
        <div class="pulse-title">Macro Risk Score</div>
        <div class="pulse-value">{risk}</div>
        <div><span class="pulse-delta delta-neutral">⚖ Stable Rates</span></div>
    </div>
</div>
