<div style='background-color: var(--accent); background-image: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0.2) 100%); border-radius: 12px; padding: 25px 30px; margin-bottom: 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); position: relative; overflow: hidden;'>
<div style='position: relative; z-index: 1;'>
<h1 style='color: var(--btn-text); margin-top: 0; margin-bottom: 8px; font-weight: 800; font-size: 2.4rem; letter-spacing: -0.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.2);'>{title}</h1>
{subtitle_html}
</div>
<!-- Sharp Dynamic Speed Slashes -->
<div style='position: absolute; top: -50%; right: -5%; width: 35%; height: 200%; background: var(--btn-text); opacity: 0.12; transform: skewX(-25deg); pointer-events: none;'></div>
<div style='position: absolute; top: -50%; right: 25%; width: 10%; height: 200%; background: var(--btn-text); opacity: 0.08; transform: skewX(-25deg); pointer-events: none;'></div>
<div style='position: absolute; top: -50%; right: 38%; width: 3%; height: 200%; background: var(--btn-text); opacity: 0.15; transform: skewX(-25deg); pointer-events: none;'></div>
</div>
